services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-fraud-detector-api
    network_mode: "host"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-your-openrouter-api-key-here}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL}
      CHROMA_DB_PATH: /data/chroma
      CHROMA_COLLECTION_NAME: fraud_knowledge
    volumes:
      - ./chroma_db:/data/chroma
      - ./knowledge:/app/knowledge:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  api-prod:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-fraud-detector-api-prod
    network_mode: "host"
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3-8b-instruct:free}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-your-openrouter-api-key-here}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma4:26b}
      CHROMA_DB_PATH: /data/chroma
      CHROMA_COLLECTION_NAME: fraud_knowledge
    volumes:
      - ./chroma_db:/data/chroma
      - ./knowledge:/app/knowledge:ro
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    cpus: "2.0"
    mem_limit: 4g
    mem_reservation: 1g
    restart: unless-stopped
